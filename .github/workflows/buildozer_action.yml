name: Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type (debug/release)"
        required: true
        default: "release"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------
      # CACHE
      # -----------------------
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-global
          restore-keys: |
            ${{ runner.os }}-buildozer-global

      - name: Cache Buildozer app directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-app-v2
          restore-keys: |
            ${{ runner.os }}-buildozer-app

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/platform/android-sdk
          key: ${{ runner.os }}-android-sdk
          restore-keys: |
            ${{ runner.os }}-android-sdk

      # -----------------------
      # SYSTEM DEPENDENCIES
      # -----------------------
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt-get install -y \
            build-essential git ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            libunwind-dev zlib1g-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev \
            openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev \
            uuid-dev libgstreamer1.0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            zip unzip autoconf libtool pkg-config libncurses5-dev libncursesw5-dev \
            libtinfo6 cmake libffi-dev libssl-dev automake

      # -----------------------
      # JAVA
      # -----------------------
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # -----------------------
      # PYTHON
      # -----------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      # -----------------------
      # CLEAN
      # -----------------------
      - name: Clean build
        run: |
          rm -rf .buildozer bin

      # -----------------------
      # BUILD APK
      # -----------------------
      - name: Build APK
        run: |
          yes | buildozer -v android ${{ github.event.inputs.build_type }}

      # -----------------------
      # SIGN APK
      # -----------------------
      - name: Sign APK
        run: |
          sudo apt-get install -y apksigner zipalign

          APK=$(ls bin/*.apk | head -n 1)

          zipalign -v 4 "$APK" bin/aligned.apk

          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

          apksigner sign \
            --ks keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out bin/pyserve-signed.apk \
            bin/aligned.apk

      # -----------------------
      # UPLOAD ARTIFACT
      # -----------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PyServe-${{ github.event.inputs.build_type }}
          path: bin/pyserve-signed.apk
          retention-days: 7