name: Android Build (Release)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------
      # CACHE
      # -----------------------
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-global

      - name: Cache Buildozer directory in app
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-app-v2

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/platform/android-sdk
          key: ${{ runner.os }}-android-sdk

      # -----------------------
      # DEPENDENCIES
      # -----------------------
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt-get install -y \
            build-essential git ffmpeg zip unzip \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            libunwind-dev zlib1g-dev libsqlite3-dev sqlite3 bzip2 \
            libbz2-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev \
            libreadline-dev uuid-dev libgstreamer1.0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            autoconf libtool pkg-config cmake libffi-dev libssl-dev automake

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      # -----------------------
      # CLEAN
      # -----------------------
      - name: Clean build
        run: |
          rm -rf .buildozer bin

      # -----------------------
      # BUILD DEBUG APK (zatím)
      # -----------------------
      - name: Build APK
        run: |
          yes | buildozer -v android debug

      # -----------------------
      # SIGN APK (pokud máš keystore secrets)
      # -----------------------
      - name: Sign APK
        env:
          KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE" | base64 --decode > release.keystore

          APK=$(find bin -name "*.apk" | head -n 1)

          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            "$APK" "$KEY_ALIAS"

      # -----------------------
      # UPLOAD
      # -----------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PyServe-release
          path: bin/*.apk