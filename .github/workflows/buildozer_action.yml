name: Android Build

on:
  workflow_dispatch:

permissions:
  contents: read   # ❌ už nepotřebujeme write (žádný release)

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # ❌ Cache vypnuta pro jistotu (kvůli problémům s dependency)
      # Pokud chceš později zrychlit build, dá se vrátit

      # Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            libunwind-dev \
            zlib1g-dev \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-dev \
            uuid-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            automake

      # Setup Java 17
      - name: Setup Java 17 required by Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install pip dependencies
      - name: Install pip dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      # 🔥 FULL CLEAN (hlavní fix!)
      - name: Full clean Buildozer
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf bin

      # Build APK
      - name: Build with Buildozer
        run: |
          yes | buildozer -v android debug

      # 📦 Upload artifact (jen pro stažení)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyserve-apk
          path: |
            bin/*.apk
            bin/*.aab
          retention-days: 3